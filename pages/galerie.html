<!DOCTYPE html>
<!-- Страница "Галерея" — фотографии города Бельцы -->
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Фотогалерея города Бельцы, Молдова.">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"/>
    <link rel="icon" href="../images/home.png">
    <script src="../js/script.js" defer></script>
    <title>Галерея — Бельцы</title>
</head>
<body>

    <!-- Шапка -->
    <header>
        <img class="logo" src="../images/home.png" alt="Логотип города Бельцы">
        <nav>
            <a href="../index.html">Главная</a>
            <a href="despre.html">О городе</a>
            <a href="dostoprimechatel.html">Достопримечательности</a>
            <a href="galerie.html" class="active">Галерея</a>
            <a href="contacte.html">Контакты</a>
        </nav>
        <i id="hamburger" onclick="mobileMenu()" class="fa-solid fa-bars" aria-label="Меню"></i>
    </header>

    <main>
        <section id="gallery-top" aria-label="Фотогалерея города">

            <h1 class="centered">Галерея города</h1>
            <p class="centered">Нажмите на фотографию для увеличения.</p>

            <!-- Галерея фотографий (интерактивность через JS) -->
            <div class="gallery-grid" id="gallery-grid">
                <figure class="gallery-item" onclick="openLightbox(this)">
                    <img src="../images/pameatnik.png" alt="Памятник Штефану Великому в Бельцах" loading="lazy">
                    <figcaption>Памятник Штефану Великому</figcaption>
                </figure>
                <figure class="gallery-item" onclick="openLightbox(this)">
                    <img src="../images/97_big.jpg" alt="Площадь Василе Александри в Бельцах" loading="lazy">
                    <figcaption>Площадь Василе Александри</figcaption>
                </figure>
                <figure class="gallery-item" onclick="openLightbox(this)">
                    <img src="../images/cdi.jpg" alt="Собор Святых Константина и Елены" loading="lazy">
                    <figcaption>Собор Константина и Елены</figcaption>
                </figure>
                <figure class="gallery-item" onclick="openLightbox(this)">
                    <img src="../images/aqua.png" alt="Аквапарк Аквалэнд в Бельцах" loading="lazy">
                    <figcaption>Аквапарк «Аквалэнд»</figcaption>
                </figure>
                <figure class="gallery-item" onclick="openLightbox(this)">
                    <img src="../images/tank.png" alt="Военный мемориал с танком" loading="lazy">
                    <figcaption>Военный мемориал</figcaption>
                </figure>
                <figure class="gallery-item" onclick="openLightbox(this)">
                    <img src="../images/index.png" alt="Панорама центра Бельц" loading="lazy">
                    <figcaption>Центр города</figcaption>
                </figure>
            </div>

            <!-- Лайтбокс для просмотра изображений (скрыт по умолчанию) -->
            <div id="lightbox" class="lightbox" onclick="closeLightbox()" aria-modal="true" role="dialog" aria-label="Просмотр фотографии">
                <div class="lightbox-inner">
                    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Закрыть">&times;</button>
                    <img id="lightbox-img" src="" alt="Увеличенное изображение">
                    <p id="lightbox-caption"></p>
                </div>
            </div>

        </section>
    </main>

    <!-- Подвал -->
    <footer>
        <div class="footer-inner">
            <span>© Бельцы 2026 | <a href="https://balti.md" target="_blank" rel="noopener noreferrer">Официальный сайт города</a></span>
            <span><a href="#gallery-top">↑ Наверх</a></span>
        </div>
    </footer>

</body>
</html>
